<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>360 Virtual Tour</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold-dim: rgba(201,168,76,0.15);
  --dark: #080810;
  --dark2: #0e0e1a;
  --glass: rgba(255,255,255,0.04);
  --glass-border: rgba(255,255,255,0.08);
  --text: #e8e4d8;
  --text-dim: rgba(232,228,216,0.45);
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:var(--dark); }
body { font-family:'DM Mono', monospace; color:var(--text); }

#wrap { position:fixed; inset:0; }
#pano { width:100%; height:100%; display:block; cursor:grab; }
#pano:active { cursor:grabbing; }

/* ── Start Screen ── */
#start {
  position:fixed; inset:0; z-index:200;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background: radial-gradient(ellipse at 50% 55%, #0f0f22 0%, #080810 100%);
  padding:2rem;
}
#start::before {
  content:''; position:absolute; inset:0;
  background: radial-gradient(circle at 50% 50%, rgba(201,168,76,0.07) 0%, transparent 60%);
  pointer-events:none;
}
.start-ring {
  width:110px; height:110px; border-radius:50%;
  border:1px solid rgba(201,168,76,0.35);
  display:flex; align-items:center; justify-content:center;
  margin-bottom:26px; position:relative;
  animation: rp 3s ease-in-out infinite;
}
.start-ring::before {
  content:''; position:absolute; inset:-10px; border-radius:50%;
  border:1px solid rgba(201,168,76,0.12);
  animation: rp 3s ease-in-out infinite 0.6s;
}
@keyframes rp { 0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,0.2)} 50%{box-shadow:0 0 24px 4px rgba(201,168,76,0.07)} }
.start-ring svg { width:44px; height:44px; }
#start h1 {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(26px,5vw,40px); font-weight:300;
  letter-spacing:0.1em; margin-bottom:8px; text-align:center;
}
#start p { font-size:11px; color:var(--text-dim); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:36px; }
.upload-zone {
  border:1px solid rgba(201,168,76,0.3); border-radius:var(--radius);
  padding:28px 36px; cursor:pointer; text-align:center;
  background:var(--gold-dim); transition:all 0.3s;
  max-width:360px; width:100%;
}
.upload-zone:hover { border-color:var(--gold); background:rgba(201,168,76,0.22); }
.upload-zone input { display:none; }
.upload-zone .ico { font-size:26px; margin-bottom:10px; }
.upload-zone strong {
  display:block; font-family:'Cormorant Garamond',serif;
  font-size:17px; font-weight:400; color:var(--gold); margin-bottom:6px; letter-spacing:0.05em;
}
.upload-zone span { font-size:10px; color:var(--text-dim); letter-spacing:0.07em; }
.start-note { margin-top:16px; font-size:10px; color:var(--text-dim); letter-spacing:0.06em; text-align:center; }

/* ── Top Bar ── */
#topbar {
  position:fixed; top:0; left:0; right:0; z-index:50;
  padding:14px 20px;
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  background:linear-gradient(to bottom, rgba(8,8,16,0.88) 0%, transparent 100%);
  pointer-events:none;
}
#topbar > * { pointer-events:all; }
#tour-title { font-family:'Cormorant Garamond',serif; font-size:16px; font-weight:300; letter-spacing:0.1em; flex:1; }
#scene-badge {
  font-size:10px; color:var(--gold); letter-spacing:0.12em; text-transform:uppercase;
  background:rgba(201,168,76,0.12); padding:4px 12px; border-radius:20px;
  border:1px solid rgba(201,168,76,0.25); display:none;
}

/* ── Controls ── */
#controls {
  position:fixed; top:14px; right:16px; z-index:51;
  display:none; gap:8px; align-items:center; flex-wrap:wrap; justify-content:flex-end;
}
.ctrl {
  font-family:'DM Mono',monospace; font-size:11px; padding:6px 14px; border-radius:20px;
  border:1px solid var(--glass-border); background:rgba(8,8,16,0.72); color:var(--text-dim);
  cursor:pointer; transition:all 0.2s; letter-spacing:0.05em; backdrop-filter:blur(10px);
}
.ctrl:hover { border-color:rgba(201,168,76,0.4); color:var(--gold); }
.ctrl.on { border-color:var(--gold); color:var(--gold); background:var(--gold-dim); }
#vr-btn { background:rgba(201,168,76,0.14); border-color:rgba(201,168,76,0.45); color:var(--gold); display:none; }
#vr-btn:hover { background:rgba(201,168,76,0.28); }
#vr-btn.on { background:rgba(201,168,76,0.38); }
#add-wrap input { display:none; }
#fov-grp { display:flex; align-items:center; gap:7px; }
#fov-grp span { font-size:10px; color:var(--text-dim); }
input[type=range] { width:65px; accent-color:var(--gold); height:2px; -webkit-appearance:none; background:rgba(255,255,255,0.1); border-radius:2px; outline:none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:11px; height:11px; border-radius:50%; background:var(--gold); cursor:pointer; }

/* ── Room Bar ── */
#roombar {
  position:fixed; bottom:0; left:0; right:0; z-index:50;
  padding:28px 18px 16px;
  background:linear-gradient(to top, rgba(8,8,16,0.92) 0%, transparent 100%);
  display:none; flex-wrap:wrap; gap:8px; align-items:center;
}
.rtag {
  font-size:10px; letter-spacing:0.1em; text-transform:uppercase;
  padding:5px 16px; border-radius:20px; border:1px solid var(--glass-border);
  background:rgba(8,8,16,0.55); color:var(--text-dim); cursor:pointer; transition:all 0.22s; backdrop-filter:blur(6px);
}
.rtag:hover { border-color:rgba(201,168,76,0.4); color:var(--gold); }
.rtag.active { border-color:var(--gold); color:var(--gold); background:var(--gold-dim); }
.radd { border-style:dashed; border-color:rgba(255,255,255,0.12); color:rgba(255,255,255,0.22); cursor:pointer; }
.radd:hover { border-color:rgba(201,168,76,0.4); color:var(--gold); }
.radd input { display:none; }

/* ── Hotspots ── */
.hotspot { position:fixed; transform:translate(-50%,-50%); z-index:40; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:6px; pointer-events:all; }
.hs-ring {
  width:54px; height:54px; border-radius:50%;
  border:1.5px solid rgba(201,168,76,0.8); background:rgba(201,168,76,0.12);
  display:flex; align-items:center; justify-content:center; backdrop-filter:blur(6px);
  animation:hsp 2.5s ease-in-out infinite; transition:transform 0.2s, background 0.2s;
}
.hotspot:hover .hs-ring { transform:scale(1.15); background:rgba(201,168,76,0.3); box-shadow:0 0 18px rgba(201,168,76,0.3); }
@keyframes hsp { 0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,0.4)} 50%{box-shadow:0 0 0 10px rgba(201,168,76,0)} }
.hs-label {
  font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--gold);
  background:rgba(8,8,16,0.78); padding:3px 10px; border-radius:10px;
  border:1px solid rgba(201,168,76,0.25); backdrop-filter:blur(4px); white-space:nowrap;
}

/* ── Crosshair ── */
#crosshair { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:18px; height:18px; z-index:60; pointer-events:none; }
#crosshair::before,#crosshair::after { content:''; position:absolute; background:rgba(201,168,76,0.85); border-radius:1px; }
#crosshair::before { width:1.5px; height:100%; left:50%; transform:translateX(-50%); }
#crosshair::after  { height:1.5px; width:100%; top:50%; transform:translateY(-50%); }

/* ── Flash / Loader / Hint ── */
#flash { position:fixed; inset:0; background:#000; opacity:0; pointer-events:none; z-index:180; transition:opacity 0.28s ease; }
#loader { position:fixed; inset:0; z-index:190; display:none; align-items:center; justify-content:center; background:rgba(8,8,16,0.82); backdrop-filter:blur(4px); flex-direction:column; gap:14px; }
#loader.show { display:flex; }
.spin { width:34px; height:34px; border-radius:50%; border:1.5px solid rgba(201,168,76,0.15); border-top-color:var(--gold); animation:spin 0.85s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.ltxt { font-size:10px; color:var(--text-dim); letter-spacing:0.15em; text-transform:uppercase; }
#hint { display:none; position:fixed; bottom:76px; left:50%; transform:translateX(-50%); font-size:10px; color:var(--text-dim); letter-spacing:0.1em; text-transform:uppercase; z-index:45; background:rgba(8,8,16,0.65); padding:6px 16px; border-radius:20px; border:1px solid var(--glass-border); backdrop-filter:blur(6px); white-space:nowrap; animation:fh 4.5s forwards; }
@keyframes fh { 0%,55%{opacity:1} 100%{opacity:0} }
#tip { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); font-size:12px; color:var(--gold); letter-spacing:0.07em; background:rgba(8,8,16,0.88); padding:10px 20px; border-radius:var(--radius); border:1px solid rgba(201,168,76,0.3); z-index:100; display:none; text-align:center; backdrop-filter:blur(6px); max-width:300px; }
</style>
</head>
<body>

<div id="flash"></div>
<div id="loader"><div class="spin"></div><span class="ltxt">Loading panorama</span></div>

<!-- Start Screen -->
<div id="start">
  <div class="start-ring">
    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="24" cy="24" r="20" stroke="#c9a84c" stroke-width="1.2"/>
      <ellipse cx="24" cy="24" rx="10" ry="20" stroke="#c9a84c" stroke-width="1.2"/>
      <line x1="4" y1="24" x2="44" y2="24" stroke="#c9a84c" stroke-width="1.2"/>
    </svg>
  </div>
  <h1>360° Virtual Tour</h1>
  <p>Immersive Architectural Visualisation</p>
  <label class="upload-zone">
    <input type="file" accept="image/*" multiple id="start-input">
    <div class="ico">⬆</div>
    <strong>Load Your Panoramas</strong>
    <span>Select one or multiple 360° equirectangular images at once</span>
  </label>
  <p class="start-note">JPG · PNG · Any resolution &nbsp;·&nbsp; PC · Mobile · Quest 2</p>
</div>

<!-- Canvas -->
<div id="wrap"><canvas id="pano"></canvas></div>
<div id="crosshair"></div>
<div id="hint"></div>
<div id="tip"></div>

<!-- Top Bar -->
<div id="topbar">
  <span id="tour-title">360° Virtual Tour</span>
  <span id="scene-badge"></span>
</div>

<!-- Controls -->
<div id="controls">
  <div id="fov-grp">
    <span>FOV</span>
    <input type="range" id="fov-sl" min="30" max="110" value="75">
  </div>
  <button class="ctrl" id="auto-btn" onclick="toggleAuto()">⟳ Rotate</button>
  <button class="ctrl" onclick="resetView()">⌂ Reset</button>
  <label class="ctrl" id="add-wrap"><input type="file" accept="image/*" id="add-input"> + Room</label>
  <button class="ctrl" id="hs-btn" onclick="toggleHSMode()">✦ Add Hotspot</button>
  <button class="ctrl" id="vr-btn" onclick="enterVR()">⬡ Enter VR</button>
</div>

<!-- Room Bar -->
<div id="roombar">
  <span style="font-size:10px;color:var(--text-dim);letter-spacing:0.1em;text-transform:uppercase;">Rooms</span>
  <div id="rdots"></div>
  <label class="rtag radd"><input type="file" accept="image/*" id="radd-input"> + Add Room</label>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let renderer,scene,camera,sphere;
let lon=0,lat=0,isDragging=false,prevM={x:0,y:0};
let fov=75,autoRot=false,isLoaded=false;
let rooms=[],curIdx=0,hotspotEls=[],hsModeActive=false,xrSession=null;

const canvas=document.getElementById('pano'), wrap=document.getElementById('wrap');

// ── Init ──
function init(){
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(fov,innerWidth/innerHeight,0.1,2000);
  renderer=new THREE.WebGLRenderer({canvas,antialias:true});
  renderer.setPixelRatio(devicePixelRatio);
  renderer.setSize(innerWidth,innerHeight);
  renderer.outputEncoding=THREE.sRGBEncoding;
  renderer.xr.enabled=true;
  const geo=new THREE.SphereGeometry(500,64,40);
  geo.scale(-1,1,1);
  sphere=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({color:0x080810}));
  scene.add(sphere);
  loop();
  checkXR();
}

function loop(){
  requestAnimationFrame(loop);
  if(renderer.xr.isPresenting) return;
  if(autoRot&&isLoaded) lon+=0.035;
  applyCamera();
  if(isLoaded) reposHotspots();
  renderer.render(scene,camera);
}

function applyCamera(){
  lat=Math.max(-85,Math.min(85,lat));
  const phi=THREE.MathUtils.degToRad(90-lat), theta=THREE.MathUtils.degToRad(lon);
  camera.position.set(500*Math.sin(phi)*Math.cos(theta),500*Math.cos(phi),500*Math.sin(phi)*Math.sin(theta));
  camera.lookAt(0,0,0);
}

// ── Load Room ──
function loadRoom(idx,cb){
  if(!rooms[idx]) return;
  showLoader(true);
  new THREE.TextureLoader().load(rooms[idx].url,tex=>{
    tex.encoding=THREE.sRGBEncoding;
    sphere.material=new THREE.MeshBasicMaterial({map:tex});
    isLoaded=true; curIdx=idx; lon=0; lat=0;
    showLoader(false);
    document.getElementById('scene-badge').style.display='block';
    document.getElementById('scene-badge').textContent=`${idx+1}/${rooms.length} · ${rooms[idx].name}`;
    renderRoomBar(); renderHotspots();
    if(cb) cb();
  },undefined,()=>{ showLoader(false); alert('Could not load image. Make sure it is a valid equirectangular 360 photo.'); });
}

// ── Files ──
function handleFiles(files){
  if(!files.length) return;
  const si=rooms.length;
  Array.from(files).forEach(f=>{ const n=f.name.replace(/\.[^.]+$/,''); if(!rooms.find(r=>r.name===n)) rooms.push({name:n,url:URL.createObjectURL(f),hotspots:[]}); });
  document.getElementById('start').style.display='none';
  document.getElementById('controls').style.display='flex';
  document.getElementById('roombar').style.display='flex';
  loadRoom(si);
  showHint('Drag · look around &nbsp;|&nbsp; Scroll · zoom &nbsp;|&nbsp; Double-click · add hotspot');
}

['start-input','add-input','radd-input'].forEach(id=>{
  document.getElementById(id).addEventListener('change',function(e){ handleFiles(e.target.files); this.value=''; });
});

// ── Room Bar ──
function renderRoomBar(){
  document.getElementById('rdots').innerHTML=rooms.map((r,i)=>
    `<span class="rtag${i===curIdx?' active':''}" onclick="switchRoom(${i})">${i+1}. ${r.name}</span>`
  ).join('');
}
function switchRoom(idx){ if(idx===curIdx) return; flash(()=>loadRoom(idx)); }

// ── Hotspot Mode ──
function toggleHSMode(){
  hsModeActive=!hsModeActive;
  document.getElementById('hs-btn').classList.toggle('on',hsModeActive);
  document.getElementById('hs-btn').textContent=hsModeActive?'✦ Click to place':'✦ Add Hotspot';
  showTip(hsModeActive?'Click anywhere in the scene to place a navigation arrow':'');
}

canvas.addEventListener('click',e=>{
  if(!hsModeActive||!isLoaded) return;
  if(rooms.length<2){ showTip('Load at least 2 rooms first!'); return; }
  const others=rooms.map((r,i)=>({i,name:r.name})).filter(r=>r.i!==curIdx);
  const ans=prompt('Place hotspot here.\n\nWhich room should this arrow go to?\nEnter room number:\n\n'+others.map(r=>`${r.i+1}. ${r.name}`).join('\n'));
  if(!ans) return;
  const ti=parseInt(ans)-1;
  if(isNaN(ti)||!rooms[ti]){ alert('Invalid room number'); return; }
  rooms[curIdx].hotspots.push({lon,lat,targetIdx:ti,label:rooms[ti].name});
  renderHotspots();
  hsModeActive=false;
  document.getElementById('hs-btn').classList.remove('on');
  document.getElementById('hs-btn').textContent='✦ Add Hotspot';
  showTip('');
});

// ── Render Hotspots ──
function renderHotspots(){
  hotspotEls.forEach(el=>el.remove()); hotspotEls=[];
  if(!rooms[curIdx]) return;
  rooms[curIdx].hotspots.forEach((hs,i)=>{
    const el=document.createElement('div');
    el.className='hotspot';
    el.innerHTML=`<div class="hs-ring"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="#c9a84c" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="hs-label">${hs.label}</span>`;
    el.addEventListener('click',()=>flash(()=>loadRoom(hs.targetIdx)));
    wrap.appendChild(el); hotspotEls.push(el);
  });
}

function reposHotspots(){
  if(!rooms[curIdx]) return;
  rooms[curIdx].hotspots.forEach((hs,i)=>{
    const el=hotspotEls[i]; if(!el) return;
    const phi=THREE.MathUtils.degToRad(90-hs.lat), theta=THREE.MathUtils.degToRad(hs.lon);
    const pos=new THREE.Vector3(500*Math.sin(phi)*Math.cos(theta),500*Math.cos(phi),500*Math.sin(phi)*Math.sin(theta));
    const dir=new THREE.Vector3(); camera.getWorldDirection(dir);
    const dot=dir.dot(pos.clone().normalize());
    if(dot<0.1){ el.style.display='none'; return; }
    el.style.display='flex';
    const p=pos.clone().project(camera);
    el.style.left=((p.x*0.5+0.5)*innerWidth)+'px';
    el.style.top=((-p.y*0.5+0.5)*innerHeight)+'px';
  });
}

// ── Mouse / Touch ──
canvas.addEventListener('mousedown',e=>{ isDragging=true; prevM={x:e.clientX,y:e.clientY}; });
window.addEventListener('mouseup',()=>isDragging=false);
canvas.addEventListener('mousemove',e=>{ if(!isDragging) return; lon-=(e.clientX-prevM.x)*0.18; lat+=(e.clientY-prevM.y)*0.18; prevM={x:e.clientX,y:e.clientY}; });
canvas.addEventListener('wheel',e=>{ fov=Math.max(30,Math.min(110,fov+e.deltaY*0.04)); camera.fov=fov; camera.updateProjectionMatrix(); document.getElementById('fov-sl').value=Math.round(fov); e.preventDefault(); },{passive:false});
let t0=null,pd=null;
canvas.addEventListener('touchstart',e=>{ t0={x:e.touches[0].clientX,y:e.touches[0].clientY}; if(e.touches.length===2) pd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); });
canvas.addEventListener('touchmove',e=>{ e.preventDefault(); if(e.touches.length===1&&t0){ lon-=(e.touches[0].clientX-t0.x)*0.25; lat+=(e.touches[0].clientY-t0.y)*0.25; t0={x:e.touches[0].clientX,y:e.touches[0].clientY}; } if(e.touches.length===2&&pd){ const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); fov=Math.max(30,Math.min(110,fov-(d-pd)*0.08)); camera.fov=fov; camera.updateProjectionMatrix(); pd=d; } },{passive:false});
document.getElementById('fov-sl').addEventListener('input',function(){ fov=+this.value; camera.fov=fov; camera.updateProjectionMatrix(); });
function resetView(){ lon=0; lat=0; }
function toggleAuto(){ autoRot=!autoRot; document.getElementById('auto-btn').classList.toggle('on',autoRot); }
window.addEventListener('resize',()=>{ renderer.setSize(innerWidth,innerHeight); camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); });

// ── WebXR ──
async function checkXR(){
  if(!navigator.xr) return;
  const ok=await navigator.xr.isSessionSupported('immersive-vr').catch(()=>false);
  if(ok) document.getElementById('vr-btn').style.display='block';
}
async function enterVR(){
  if(xrSession){ xrSession.end(); return; }
  try{
    xrSession=await navigator.xr.requestSession('immersive-vr',{requiredFeatures:['local'],optionalFeatures:['hand-tracking']});
    renderer.xr.setSession(xrSession);
    xrSession.addEventListener('end',()=>{ xrSession=null; document.getElementById('vr-btn').textContent='⬡ Enter VR'; document.getElementById('vr-btn').classList.remove('on'); document.getElementById('crosshair').style.display='none'; renderer.setAnimationLoop(null); loop(); });
    document.getElementById('vr-btn').textContent='⬡ Exit VR';
    document.getElementById('vr-btn').classList.add('on');
    document.getElementById('crosshair').style.display='block';
    renderer.setAnimationLoop(()=>{ reposHotspots(); renderer.render(scene,camera); });
  } catch(err){ alert('VR not available.\n\nOn Quest 2: open in Meta Browser → tap Enter VR\n\n'+err.message); }
}

// ── Helpers ──
function showLoader(v){ document.getElementById('loader').className=v?'show':''; }
function flash(cb){ const f=document.getElementById('flash'); f.style.opacity='1'; setTimeout(()=>{ cb(); setTimeout(()=>f.style.opacity='0',340); },270); }
let ht; function showHint(m){ const h=document.getElementById('hint'); h.textContent=m; h.style.display='block'; h.style.animation='none'; requestAnimationFrame(()=>h.style.animation='fh 4.5s forwards'); clearTimeout(ht); ht=setTimeout(()=>h.style.display='none',5000); }
let tt; function showTip(m){ const t=document.getElementById('tip'); if(!m){t.style.display='none';return;} t.textContent=m; t.style.display='block'; clearTimeout(tt); tt=setTimeout(()=>t.style.display='none',3500); }

init();
</script>
</body>
</html>
